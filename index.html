<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Springs &amp; Pendulums</title>
  <link rel="stylesheet" href="style.css">
  <!-- PyScript: lets us write the simulation in Python and run it in the browser.
       If the page ever stops loading, bump this version number. -->
  <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css">
  <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
</head>
<body>
  <h1>Springs &amp; Pendulums</h1>

  <div id="app">
    <canvas id="sim" width="820" height="520"></canvas>

    <div id="panel">
      <div class="buttons">
        <button id="add-pendulum">+ Pendulum</button>
        <button id="add-spring">+ Spring</button>
      </div>
      <div class="buttons">
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
      </div>

      <p id="selected-label">Click an object to adjust it</p>

      <label>Gravity: <span id="gravity-val">9.8</span> m/s&sup2;
        <input type="range" id="gravity" min="0" max="20" step="0.1" value="9.8">
      </label>

      <label>Length: <span id="length-val">1.50</span> m
        <input type="range" id="length" min="0.5" max="3" step="0.05" value="1.5">
      </label>

      <label>Mass: <span id="mass-val">1.0</span> kg
        <input type="range" id="mass" min="0.5" max="5" step="0.1" value="1.0">
      </label>

      <label>Stiffness: <span id="stiffness-val">30</span> N/m
        <input type="range" id="stiffness" min="5" max="100" step="1" value="30">
      </label>
    </div>
  </div>

  <p class="hint">
    Add pendulums and springs with the buttons. Click an object to select it,
    then use the sliders to change it. Gravity affects everything.
  </p>

  <script type="py" src="./main.py"></script>
</body>
</html>
