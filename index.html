<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Springs &amp; Pendulums</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <h1>Springs &amp; Pendulums</h1>
  <div id="transport">
    <button id="btn-play" title="Pause / resume (Space)">&#10074;&#10074;</button>
    <button id="btn-reset" title="Reset all objects to their starting state">&#8634; Reset</button>
    <label class="speed">Speed
      <input id="speed" type="range" min="0.1" max="2" step="0.05" value="1">
      <span id="speed-val">1.00&times;</span>
    </label>
  </div>
</header>

<main>
  <div id="canvas-wrap"><canvas id="sim"></canvas></div>

  <aside id="sidebar">
    <section class="panel">
      <h2>Add object</h2>
      <div class="add-buttons">
        <button id="add-pendulum">+ Pendulum</button>
        <button id="add-spring">+ Spring</button>
        <button id="add-double">+ Double pendulum</button>
      </div>
    </section>

    <section class="panel">
      <h2>Global</h2>
      <label class="slider-row">
        <span class="lbl"><span>Gravity</span><span class="val" id="gravity-val">9.81 m/s&sup2;</span></span>
        <input id="gravity" type="range" min="0" max="25" step="0.01" value="9.81">
      </label>
    </section>

    <section class="panel">
      <h2>Objects</h2>
      <ul id="object-list"></ul>
    </section>

    <section class="panel" id="inspector" hidden>
      <h2 id="insp-name">&mdash;</h2>
      <div id="insp-params"></div>
      <label class="check-row"><input type="checkbox" id="insp-trail"> Motion trail</label>
      <label class="check-row"><input type="checkbox" id="insp-vectors"> Velocity &amp; force vectors</label>
      <div class="readout">
        <span class="k">Kinetic</span><span id="ro-ke">&ndash;</span>
        <span class="k">Potential</span><span id="ro-pe">&ndash;</span>
        <span class="k">Total</span><span id="ro-tot">&ndash;</span>
        <span class="k">Period</span><span id="ro-period">&ndash;</span>
      </div>
      <canvas id="graph"></canvas>
      <button id="insp-delete" class="danger">Delete object</button>
    </section>

    <section class="panel hint">
      Drag a mass to position it, release to let go. Drag an anchor bracket to
      move a whole system. Click an object to inspect it. Space pauses.
    </section>
  </aside>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
